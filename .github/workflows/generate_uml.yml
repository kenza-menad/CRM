name: Generate UML Diagram

on:
  push:
    branches: [main]

jobs:
  generate-uml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Java & Graphviz
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y default-jre graphviz

      - name: Download PlantUML jar
        run: |
          wget -q https://github.com/plantuml/plantuml/releases/download/v1.2024.3/plantuml-1.2024.3.jar -O /tmp/plantuml.jar

      - name: Generate PNG from PUML
        run: |
          java -jar /tmp/plantuml.jar -tpng doc/diagram_model.puml -o ../doc/

      - name: Commit and push diagram
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add doc/
          git diff --cached --quiet || git commit -m "docs: Update UML diagram automatically"
          git push